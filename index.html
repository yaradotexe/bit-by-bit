<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bit-by-Bit Buddy V2 | IHK AP1 Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="crt">
    <div class="scanlines"></div>
    <div class="terminal-container">
        <div class="terminal-header" id="terminal-header"></div>
        <div class="terminal-output" id="terminal-output"></div>
        <div class="terminal-input">
            <span class="prompt">></span>
            <input type="text" id="command-input" autofocus autocomplete="off" placeholder="Tippe einen Befehl...">
        </div>
    </div>

    <!-- App Context -->
    <script src="js/quiz-loader.js"></script>
    <script src="js/learn-loader.js"></script>
    <script src="js/buddy-config.js" defer></script>
    <script src="js/audio.js" defer></script>

    <!-- Data Chapters -->
    <script src="quiz/ch1.js" defer></script>
    <script src="quiz/ch2.js" defer></script>
    <script src="quiz/ch3.js" defer></script>
    <script src="quiz/ch4.js" defer></script>
    <script src="quiz/ch5.js" defer></script>
    <script src="quiz/ch6.js" defer></script>
    <script src="quiz/ch7.js" defer></script>
    
    <!-- Learn Data Modules -->
    <script src="learn-data/wirtschaft.js" defer></script>
    <script src="learn-data/hardware.js" defer></script>
    <script src="learn-data/netzwerk.js" defer></script>
    <script src="learn-data/software.js" defer></script>

    <!-- Modular Logic -->
    <script src="js/state.js" defer></script>
    <script src="js/ui.js" defer></script>
    <script src="js/quiz.js" defer></script>
    <script src="js/commands.js" defer></script>
    <script src="js/main.js" defer></script>
</body>
</html>
